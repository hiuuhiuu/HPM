# ============================================================
#  Hamster APM - 기본 메서드 후킹 설정 (hamster-methods.conf)
#  콜 트리에 표시할 클래스/메서드를 지정합니다.
#
#  형식: 패키지.클래스명[메서드1,메서드2]
#  참고: OTel이 자동 계측하는 Servlet/Spring은 자동으로 잡힘.
#        이 파일은 OTel이 모르는 비즈니스 로직 레이어를 추가할 때 사용.
# ============================================================

# ── Servlet API (OTel 미자동계측 커스텀 서블릿) ───────────
# GenericServlet/HttpServlet 을 직접 상속한 커스텀 클래스 예시
# com.example.web.OrderServlet[doGet,doPost]
# com.example.web.LoginServlet[doPost]

# ── JSP 헬퍼 / TagLib ────────────────────────────────────
# com.example.tag.PaginationTag[doStartTag,doEndTag]

# ── Spring MVC Controller ────────────────────────────────
com.example.controller.OrderController[createOrder,getOrder,getOrders,cancelOrder]
com.example.controller.CustomerController[getCustomer,getCustomers,updateCustomer]
com.example.controller.ProductController[getProducts,getProduct]

# ── Spring Service (트랜잭션 경계) ───────────────────────
com.example.service.OrderService[process,validate,findById,findActiveOrders,cancel]
com.example.service.CustomerService[findById,findAll,update]
com.example.service.ProductService[findAvailable]
com.example.service.NotificationService[sendConfirm,sendCancelNotice]
com.example.service.OrderValidator[validate]

# ── Repository / DAO (DB 접근 레이어) ────────────────────
com.example.dao.OrderDao[insert,findById,findByStatus,updateStatus]
com.example.dao.CustomerDao[findById,findAll,update]
com.example.dao.ProductDao[findActive]

# ── JEUS 비즈니스 EJB / WS 예시 ─────────────────────────
# com.example.ejb.OrderSessionBean[createOrder,cancelOrder]
# com.example.ws.OrderWebService[placeOrder]
