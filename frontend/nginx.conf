# WebSocket 업그레이드 여부에 따라 Connection 헤더를 동적으로 설정
# 프록시를 거쳐 $http_upgrade 가 비어 있으면 "close" 를 사용해 커넥션이 닫히지 않도록 함
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # API → 백엔드 프록시
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # SSE(Server-Sent Events) 응답 버퍼링 비활성화
        # /api/metrics/stream 등 스트리밍 응답이 즉시 클라이언트에 전달되도록 함
        proxy_buffering    off;
    }

    # WebSocket → 백엔드 프록시
    # 중간 프록시가 Upgrade 헤더를 제거할 경우 /ws/dashboard, /ws/metrics 에 404 발생.
    # 이 경우 프론트엔드는 자동으로 /api/metrics/stream(SSE) 폴백으로 전환한다.
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;  # map 변수 사용
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # WebSocket 장시간 유지
    }

    location /otlp/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # SPA 라우팅 — 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 캐시: 정적 에셋 (JS, CSS, 이미지)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 헬스체크 엔드포인트
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
